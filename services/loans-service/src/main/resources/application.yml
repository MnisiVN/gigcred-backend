spring:
  application:
    name: loans-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.gigcred.example.com/
server:
  port: 8087
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: loans-service
