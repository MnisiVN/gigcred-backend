spring:
  application:
    name: gateway-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.gigcred.example.com/
server:
  port: 8080
logging:
  level:
    root: INFO
    com.gigcred: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: gateway-service
