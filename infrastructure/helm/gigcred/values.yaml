image:
  repository: ghcr.io/gigcred/backend
  tag: latest
  pullPolicy: IfNotPresent

services:
  - name: gateway-service
    port: 8080
  - name: onboarding-service
    port: 8081
  - name: accounts-service
    port: 8082
  - name: payments-service
    port: 8083
  - name: ledger-service
    port: 8084
  - name: cards-service
    port: 8085
  - name: scoring-service
    port: 8086
  - name: loans-service
    port: 8087
  - name: compliance-service
    port: 8088
  - name: notifications-service
    port: 8089
  - name: ops-service
    port: 8090
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
