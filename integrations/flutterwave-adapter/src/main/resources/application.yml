spring:
  application:
    name: flutterwave-adapter
  main:
    banner-mode: "off"
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
  datasource:
    url: jdbc:postgresql://localhost:5432/gigcred
    username: gigcred
    password: gigcred
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    root: INFO
    com.gigcred.integrations.flutterwave: DEBUG
flutterwave:
  base-url: https://api.flutterwave.com/v3
  api-key: "+REPLACE_WITH_SECURE_VALUE+"
  webhook-secret: "+REPLACE_WITH_SECURE_SECRET+"
  connect-timeout-ms: 3000
  read-timeout-ms: 5000
resilience4j:
  circuitbreaker:
    instances:
      flutterwave:
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  retry:
    instances:
      flutterwave:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.io.IOException
          - feign.FeignException$ServerError
  bulkhead:
    instances:
      flutterwave:
        max-concurrent-calls: 20
        max-wait-duration: 5s
